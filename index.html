<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8">
    <title>My AI Works 展示分享平台</title>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0c10">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" sizes="192x192" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XLWN2XBQ5F"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XLWN2XBQ5F', { 'cookie_flags': 'SameSite=None;Secure' });
    </script>
  </head>
  <body>
    <header>
      <h1 style="line-height: 1.2;">
        MY AI WORKS
        <span style="display: block; font-size: 1.2rem; color: #ccc; letter-spacing: 8px; margin-top: 12px; font-weight: normal; text-shadow: none;">展示分享平台</span>
      </h1>
      <div class="profile-container">
        <div class="profile-left">
           <img src="https://drive.google.com/thumbnail?id=1sgSYbMVX3uEKegLo4zZV8X5ujwglWxI-&sz=w400" class="profile-img" alt="Famidoc">
        </div>
        <div class="profile-center">
          <h2>張文華 (Famidoc Chang)</h2>
          <p>歡迎來到我的 AI 創作宇宙！</p>
          <div class="social-btn-group">
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=famidoctor@gmail.com&su=Hi_Famidoc" target="_blank" class="social-link">EMAIL ME</a>
            <a href="https://www.facebook.com/zhang.wen.hua.948904/" target="_blank" class="social-link">FACEBOOK</a>
          </div>
        </div>
        <div class="profile-right">
          <img src="https://drive.google.com/thumbnail?id=1ESzbQ5MnpwenxesOMQy1lE65HgfcBfFJ&sz=w400" class="qr-img" alt="Scan Me">
          <div class="qr-text">SCAN ME</div>
        </div>
      </div> 
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('images')">IMAGES</button>
        <button class="tab-btn" onclick="switchTab('videos')">VIDEOS</button>
        <button class="tab-btn" onclick="switchTab('comics')">COMICS</button>
        <button class="tab-btn" onclick="switchTab('apps')">APPS</button>
      </div>
    </header>    

    <div class="action-bar">
      <div class="action-group" style="gap: 10px;">
        <input type="text" id="searchInput" class="search-input" placeholder="SEARCH // 搜尋作品關鍵字..." onkeyup="filterData()">
        <select id="sortSelect" class="sort-select" onchange="updateGallery()">
          <option value="newest">NEWEST</option>
          <option value="popular">POPULAR</option>
          <option value="liked">LIKED</option>
        </select>
      </div>
      <div class="action-group">
        <input type="email" id="sub-email" class="sub-input" placeholder="EMAIL // 訂閱新作品通知..." required>
        <button id="sub-btn" class="sub-btn" onclick="subscribeNewsletter()">SUBSCRIBE</button>
      </div>
    </div>
    <div id="sub-msg" class="action-msg"></div>

    <div id="loader">SYSTEM INITIALIZING...</div>

    <div id="gallery-images" class="gallery-section active"></div>
    <div id="gallery-videos" class="gallery-section"></div>
    <div id="gallery-comics" class="gallery-section"></div>
    <div id="gallery-apps" class="gallery-section"></div>

    <div id="modal" class="modal-overlay" onclick="closeModal(event)">
      <div class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</div>
      <div class="nav-btn next" onclick="changeSlide(1)">&#10095;</div>
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="close-btn" onclick="closeModalDirect()">×</div>
        <div id="modal-media-container" class="modal-body"></div>
        <div class="modal-info">
          <span id="modal-tag" class="tag"></span>
          <h2 id="modal-title"></h2>
          <p id="modal-desc"></p>
          <div id="modal-actions"></div>
          <div class="comments-section">
            <div class="comments-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
              TERMINAL LOGS // 訪客留言
            </div>
            <div class="comment-form">
              <input type="text" id="comment-nick" class="comment-input" placeholder=">> NICKNAME (暱稱)" maxlength="30">
              <textarea id="comment-content" class="comment-textarea" placeholder=">> ENTER MESSAGE... (想說些什麼？)" required></textarea>
              <button id="comment-submit" class="comment-submit-btn" onclick="submitComment()">TRANSMIT / 傳送</button>
            </div>
            <div id="comments-list" class="comments-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="backToTop" class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
    </div>

    <script src="app.js"></script>
    <footer>&copy; 2026 <span>Famidoc Chang</span>. All Rights Reserved.<br>Powered by AI & GitHub Pages.</footer>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('ServiceWorker 註冊成功，範圍為: ', registration.scope);
            })
            .catch(err => {
              console.log('ServiceWorker 註冊失敗: ', err);
            });
        });
      }
    </script>
  </body>
</html>
  </body>
</html>
